<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8f3b2f">
  <meta name="description" content="今庄の歴史とまちなみを歩いて楽しむ、インストール不要のまち歩きWebアプリ。">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <title>今庄まち歩き</title>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">MINAMIECHIZEN · IMAJO</p>
      <h1>今庄まち歩き</h1>
    </div>
    <button id="installBtn" class="ghost-button" hidden>ホームに追加</button>
  </header>

  <main>
    <section class="hero">
      <div>
        <p>宿場町の路地、鉄道の記憶、今庄の味。</p>
        <h2>歩くほど、まちの物語が見えてくる。</h2>
      </div>
      <button id="startWalkBtn" class="primary-button">地図から歩き始める</button>
    </section>

    <nav class="tabbar" aria-label="画面切り替え">
      <button class="tab active" data-view="mapView">地図</button>
      <button class="tab" data-view="spotsView">スポット</button>
      <button class="tab" data-view="routesView">コース</button>
      <button class="tab" data-view="stampsView">スタンプ</button>
    </nav>

    <section id="mapView" class="view active">
      <div class="map-toolbar">
        <button id="locateBtn" class="secondary-button">現在地を表示</button>
        <span id="locationStatus" role="status">位置情報は未取得です</span>
      </div>
      <div id="map" aria-label="今庄まち歩き地図"></div>
      <p class="map-note">地図データ © OpenStreetMap contributors</p>
    </section>

    <section id="spotsView" class="view">
      <div class="section-heading">
        <div><p class="eyebrow">SPOTS</p><h2>立ち寄りスポット</h2></div>
        <select id="categoryFilter" aria-label="カテゴリ絞り込み">
          <option value="all">すべて</option>
          <option value="history">歴史</option>
          <option value="railway">鉄道</option>
          <option value="food">食</option>
          <option value="rest">休憩・案内</option>
        </select>
      </div>
      <div id="spotList" class="card-grid"></div>
    </section>

    <section id="routesView" class="view">
      <div class="section-heading"><div><p class="eyebrow">COURSES</p><h2>モデルコース</h2></div></div>
      <div id="routeList" class="route-list"></div>
    </section>

    <section id="stampsView" class="view">
      <div class="section-heading"><div><p class="eyebrow">STAMP RALLY</p><h2>まち歩きスタンプ</h2></div></div>
      <div class="stamp-summary"><strong id="stampCount">0</strong><span> / 6 個</span></div>
      <p class="muted">現地QRコードの代わりに、試作版では各スポット詳細から取得できます。</p>
      <div id="stampList" class="stamp-grid"></div>
      <button id="resetStampsBtn" class="danger-button">スタンプをリセット</button>
    </section>
  </main>

  <dialog id="spotDialog">
    <button id="closeDialogBtn" class="dialog-close" aria-label="閉じる">×</button>
    <div id="dialogContent"></div>
  </dialog>

  <footer>試作版 · 掲載内容と地点は公開前に現地確認してください</footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
